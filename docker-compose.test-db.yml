services:
  mes_test_db:
    image: postgres:16-alpine
    container_name: syntech-mes-test-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mes_test
      POSTGRES_USER: syntechdb
      POSTGRES_PASSWORD: change_me
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntechdb -d mes_test"]
      interval: 5s
      timeout: 5s
      retries: 20
