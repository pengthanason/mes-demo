services:
  postgres:
    image: postgres:16-alpine
    container_name: mes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syntechdb
      POSTGRES_PASSWORD: syntech2026
      POSTGRES_DB: productiondb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      default: {}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syntechdb -d productiondb"]
      interval: 5s
      timeout: 5s
      retries: 10

  mes_backbone:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mes-backbone
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5100
      APP_DEBUG: "false"
      APP_VERSION: ${MES_APP_VERSION:-0.1.0-station2}
      MES_ENV: ${MES_ENV:-dev}
      MES_READY_STRICT: ${MES_READY_STRICT:-false}
      MES_CORS_ORIGINS: ${MES_CORS_ORIGINS:-}
      MES_AUTH_MODE: ${MES_AUTH_MODE:-hybrid}
      MES_JWT_ISSUER: ${MES_JWT_ISSUER:-syntech-mes-backbone}
      MES_JWT_SECRET: ${MES_JWT_SECRET:-}
      MES_JWT_ACCESS_TTL_SEC: ${MES_JWT_ACCESS_TTL_SEC:-900}
      MES_JWT_REFRESH_TTL_SEC: ${MES_JWT_REFRESH_TTL_SEC:-604800}
      MES_MAX_CONCURRENT_SESSIONS: ${MES_MAX_CONCURRENT_SESSIONS:-3}
      MES_SESSION_INACTIVITY_SEC: ${MES_SESSION_INACTIVITY_SEC:-1800}
      NEXT_WEB_HOST: ${NEXT_WEB_HOST:-host.docker.internal}
      NEXT_WEB_PORT: ${NEXT_WEB_PORT:-3005}
      JIG_API_URL: ${JIG_API_URL:-http://host.docker.internal:3000}
      JIG_API_KEY: ${JIG_API_KEY:-}
      WMS_API_URL: ${WMS_API_URL:-http://wms-api:8000}
      WMS_API_TOKEN: ${WMS_API_TOKEN:-}
      WMS_SERVICE_USER: ${WMS_SERVICE_USER:-mes_service}
      WMS_SERVICE_PIN: ${WMS_SERVICE_PIN:-mes@syntech2026}
      MRP_API_URL: ${MRP_API_URL:-http://mrp-api:8001}
      MRP_SERVICE_TOKEN: ${MRP_SERVICE_TOKEN:-}
      MRP_API_USER: ${MRP_API_USER:-admin}
      MRP_API_PASSWORD: ${MRP_API_PASSWORD:-mes_mrp_svc_2026!}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productiondb
      DB_USER: syntechdb
      DB_PASSWORD: syntech2026
      DB_SCHEMA: ${MES_DB_SCHEMA:-}
      DB_SSLMODE: disable
      DB_CONNECT_TIMEOUT: ${MES_DB_CONNECT_TIMEOUT:-5000}
      EVENT_INBOX_SECRET: ${EVENT_INBOX_SECRET:-}
      STOCK_WEBHOOK_SECRET: ${STOCK_WEBHOOK_SECRET:-}
      SKIP_KITTING: ${SKIP_KITTING:-true}
      MES_RATE_LIMIT_ENABLED: ${MES_RATE_LIMIT_ENABLED:-false}
    ports:
      - "5100:5100"
    networks:
      default: {}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5100/api/mes/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  my_api:
    build:
      context: ./my-api
      dockerfile: Dockerfile
    container_name: mes-my-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5099
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productiondb
      DB_USER: syntechdb
      DB_PASSWORD: syntech2026
      SEED_DEMO: "false"
    ports:
      - "5099:5099"
    networks:
      default: {}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5099/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
